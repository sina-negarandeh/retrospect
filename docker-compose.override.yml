services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    depends_on:
      mlflow:
        condition: service_started
    volumes:
      - .:/app
    environment:
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
