services:
  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  # MLflow tracking server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    restart: unless-stopped
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
    volumes:
      - mlflow-data:/mlflow
    ports:
      - "5002:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3)\" || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  # Retrospect API
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      MLFLOW_TRACKING_URI: http://mlflow:5000
      HF_TOKEN: ${HF_TOKEN}
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"

volumes:
  mlflow-data:
  qdrant-data:
